name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN. Pushing back to main from inside this
          # workflow does NOT retrigger Release (or any other workflow), so
          # there is no recursion risk. See:
          #   https://docs.github.com/en/actions/security-guides/automatic-token-authentication
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Detect unreleased changesets
        id: detect
        run: |
          # Count `.changeset/*.md` excluding the README.
          count=$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.detect.outputs.has_changesets == 'true'
        run: yarn changeset version

      - name: Commit version bump, tag, push to main, and trigger docker build
        if: steps.detect.outputs.has_changesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # The server package's version is the canonical monorepo tag. All
          # public packages are kept in lockstep via the changeset; this
          # assumption is fine for a private monorepo with a single shipping
          # artifact (the Discord bot).
          VERSION=$(node -p "require('./apps/server/package.json').version")

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(release): version packages to v${VERSION}"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"

          # Extract the just-versioned `## X.X.X` block from the server
          # CHANGELOG (mirrors the changeset body the user wrote) and publish
          # it as the GitHub Release body. AWK exits at the second `##` so we
          # only ship the most recent version's notes.
          awk '/^## / { if (++c > 1) exit } c == 1' apps/server/CHANGELOG.md > /tmp/release-notes.md
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --verify-tag

          # `GITHUB_TOKEN` pushes do not trigger another workflow run, so the
          # Docker workflow's `tags: ['v*']` listener does not fire on the tag
          # we just pushed. Kick it explicitly via workflow_dispatch (which is
          # exempt from the no-recursion rule).
          gh workflow run docker.yml --ref "v${VERSION}"
