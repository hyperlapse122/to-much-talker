name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/to-much-talker
  NODE_VERSION: '24'

jobs:
  resolve-versions:
    name: Resolve toolchain versions
    runs-on: ubuntu-latest
    outputs:
      turbo: ${{ steps.versions.outputs.turbo }}
    steps:
      - uses: actions/checkout@v4
      - id: versions
        name: Read turbo version from root package.json
        run: |
          turbo=$(node scripts/resolve-version.mts turbo)
          echo "turbo=$turbo" >> "$GITHUB_OUTPUT"
          echo "Resolved turbo@$turbo"

  build-bot:
    name: Build Bot Image
    runs-on: ubuntu-latest
    needs: resolve-versions
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prune monorepo for @to-much-talker/server
        run: npx --yes turbo@${{ needs.resolve-versions.outputs.turbo }} prune @to-much-talker/server --docker --out-dir out-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/server
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./out-server
          file: containers/server.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  build-playground:
    name: Build Playground Image
    runs-on: ubuntu-latest
    needs: resolve-versions
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prune monorepo for @to-much-talker/playground
        run: npx --yes turbo@${{ needs.resolve-versions.outputs.turbo }} prune @to-much-talker/playground --docker --out-dir out-playground

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/playground

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./out-playground
          file: containers/playground.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=playground
          cache-to: type=gha,mode=max,scope=playground

  build-docs:
    name: Build Docs Image
    runs-on: ubuntu-latest
    needs: resolve-versions
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prune monorepo for @to-much-talker/docs
        run: npx --yes turbo@${{ needs.resolve-versions.outputs.turbo }} prune @to-much-talker/docs --docker --out-dir out-docs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/docs

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./out-docs
          file: containers/docs.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs
