name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/to-much-talker
  NODE_VERSION: '24'

jobs:
  resolve-versions:
    name: Resolve toolchain versions
    runs-on: ubuntu-latest
    outputs:
      turbo: ${{ steps.versions.outputs.turbo }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - id: versions
        name: Read turbo version from root package.json
        run: |
          turbo=$(node scripts/resolve-version.mts turbo)
          echo "turbo=$turbo" >> "$GITHUB_OUTPUT"
          echo "Resolved turbo@$turbo"

  meta:
    name: Metadata (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [server, playground, docs]
    outputs:
      tags-server: ${{ steps.set.outputs.tags-server }}
      tags-playground: ${{ steps.set.outputs.tags-playground }}
      tags-docs: ${{ steps.set.outputs.tags-docs }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract metadata
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - id: set
        name: Stash per-image tags into a job output
        run: |
          tags='${{ steps.docker-meta.outputs.tags }}'
          printf 'tags-%s<<EOF\n%s\nEOF\n' '${{ matrix.image }}' "$tags" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    needs: [resolve-versions, meta]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [server, playground, docs]
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-24.04
          - platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prune monorepo for @to-much-talker/${{ matrix.image }}
        run: |
          target="${{ matrix.image }}"
          npx --yes turbo@${{ needs.resolve-versions.outputs.turbo }} \
            prune "@to-much-talker/${target}" --docker --out-dir "out-${target}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build per-arch image (push by digest)
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./out-${{ matrix.image }}
          file: containers/${{ matrix.image }}.Dockerfile
          platforms: linux/${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }},name-canonical=true,push-by-digest=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: Build per-arch image (PR — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./out-${{ matrix.image }}
          file: containers/${{ matrix.image }}.Dockerfile
          platforms: linux/${{ matrix.platform }}
          provenance: false
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${{ runner.temp }}/digests/${{ matrix.image }}"
          digest='${{ steps.build.outputs.digest }}'
          [ -n "$digest" ] || { echo "Empty digest"; exit 1; }
          touch "${{ runner.temp }}/digests/${{ matrix.image }}/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform }}
          path: ${{ runner.temp }}/digests/${{ matrix.image }}/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest (${{ matrix.image }})
    needs: [meta, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [server, playground, docs]
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          TAGS_SERVER: ${{ needs.meta.outputs.tags-server }}
          TAGS_PLAYGROUND: ${{ needs.meta.outputs.tags-playground }}
          TAGS_DOCS: ${{ needs.meta.outputs.tags-docs }}
        run: |
          case '${{ matrix.image }}' in
            server) raw_tags="$TAGS_SERVER" ;;
            playground) raw_tags="$TAGS_PLAYGROUND" ;;
            docs) raw_tags="$TAGS_DOCS" ;;
            *) echo "unknown image" && exit 1 ;;
          esac
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_args+=(-t "$tag")
          done <<< "$raw_tags"
          digest_refs=()
          for f in *; do
            [ -f "$f" ] || continue
            digest_refs+=("$IMAGE_REF@sha256:$f")
          done
          [ "${#tag_args[@]}" -gt 0 ] || { echo "no tags resolved"; exit 1; }
          [ "${#digest_refs[@]}" -gt 0 ] || { echo "no digests found"; exit 1; }
          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"

      - name: Inspect resulting manifest
        run: |
          for tag in $(printf '%s\n' "${{ needs.meta.outputs.tags-server }}${{ needs.meta.outputs.tags-playground }}${{ needs.meta.outputs.tags-docs }}" | head -1); do
            [ -n "$tag" ] || continue
            docker buildx imagetools inspect "$tag" || true
          done
