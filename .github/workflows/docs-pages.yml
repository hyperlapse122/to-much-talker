name: Docs Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Pages
        # Pages must be enabled once in repository Settings → Pages →
        # Source: "GitHub Actions". Auto-enablement via `enablement: true`
        # requires `administration: write`, which is NOT a valid
        # GITHUB_TOKEN permission scope — that scope only exists on PATs.
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck docs
        run: yarn workspace @to-much-talker/docs typecheck

      - name: Build docs
        run: yarn workspace @to-much-talker/docs build
        env:
          DOCS_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Add SPA fallback
        run: cp apps/docs/dist/index.html apps/docs/dist/404.html

      - name: Verify Pagefind output
        run: test -f apps/docs/dist/pagefind/pagefind.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/dist

  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
